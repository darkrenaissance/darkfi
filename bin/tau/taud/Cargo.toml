[package]
name = "taud"
description = "Encrypted tasks management app using peer-to-peer network and Event Graph."
version = "0.5.0"
edition = "2021"
authors = ["Dyne.org foundation <foundation@dyne.org>"]
license = "AGPL-3.0-only"
homepage = "https://dark.fi"
repository = "https://codeberg.org/darkrenaissance/darkfi"

[lib]
name = "taud"
path = "src/lib.rs"

[[bin]]
name = "taud"
path = "src/main.rs"

[dependencies]
darkfi = { path = "../../../", features = [
    "bs58",
    "async-daemonize",
    "event-graph",
    "rpc",
    "zk"
] }

darkfi-sdk = {path = "../../../src/sdk", features = ["async"]}
darkfi-serial = {path = "../../../src/serial"}

# Event Graph DB
sled-overlay = "0.1.20"

# Crypto
blake3 = "1.8.5"
crypto_box = { version = "0.9.1", features = ["std", "chacha20"] }
rand = "0.8.6"

# Encoding and parsing
bs58 = "0.5.1"
toml = "0.9.8"

# Misc
async-trait = "0.1.89"
chrono = "0.4.44"
futures = "0.3.32"
libc = "0.2.186"
tracing = "0.1.44"
thiserror = "2.0.18"
tinyjson = "2.5.1"
url = "2.5.8"

# Daemon
easy-parallel = "3.3.1"
signal-hook-async-std = "0.4.0"
signal-hook = "0.4.4"
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["fmt"] }
tracing-appender = "0.2.5"
smol = "2.0.2"

# Argument parsing
serde = { version = "1.0.228", features = ["derive"] }
structopt = "0.3.26"
structopt-toml = "0.5.1"

[lints]
workspace = true
