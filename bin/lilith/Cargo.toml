[package]
name = "lilith"
description = "Daemon that spawns P2P seeds"
version = "0.5.0"
edition = "2021"
authors = ["Dyne.org foundation <foundation@dyne.org>"]
license = "AGPL-3.0-only"
homepage = "https://dark.fi"
repository = "https://codeberg.org/darkrenaissance/darkfi"

[dependencies]
darkfi = {path = "../../", features = ["toml", "async-daemonize", "rpc"]}

# Misc
async-trait = "0.1.89"
futures = "0.3.32"
tracing = "0.1.44"
semver = "1.0.28"
tinyjson = "2.5.1"
toml = "0.9.8"
url = "2.5.8"

# Daemon
easy-parallel = "3.3.1"
signal-hook-async-std = "0.4.0"
signal-hook = "0.4.4"
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["fmt"] }
tracing-appender = "0.2.5"
smol = "2.0.2"

# Argument parsing
serde = {version = "1.0.228", features = ["derive"]}
structopt = "0.3.26"
structopt-toml = "0.5.1"

[lints]
workspace = true

